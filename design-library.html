<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Library – DesignVerse</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { padding-top: 70px; }
    .lib-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .lib-tab {
      padding: 0.5rem 1.25rem; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }
    .lib-tab:hover, .lib-tab.active { background: rgba(124,58,237,0.15); border-color: var(--accent-primary); color: var(--accent-secondary); }
    .lib-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; }
    .lib-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: var(--transition); cursor: pointer;
    }
    .lib-card:hover { border-color: var(--accent-primary); transform: translateY(-3px); box-shadow: var(--shadow-glow); }
    .lib-thumb {
      height: 160px; display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; position: relative;
    }
    .lib-badge {
      position: absolute; top: 0.75rem; right: 0.75rem;
      padding: 0.2rem 0.6rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700;
    }
    .lib-badge-free { background: rgba(16,185,129,0.2); color: #10b981; }
    .lib-badge-pro { background: rgba(245,158,11,0.2); color: var(--accent-gold); }
    .lib-body { padding: 1rem; }
    .lib-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
    .lib-meta { font-size: 0.78rem; color: var(--text-muted); }
    .lib-actions { display: flex; gap: 0.5rem; padding: 0.75rem 1rem; border-top: 1px solid var(--border); }
    .lib-btn {
      flex: 1; padding: 0.45rem; border-radius: var(--radius-sm);
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: var(--transition);
      border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    }
    .lib-btn:hover { border-color: var(--accent-primary); color: var(--accent-secondary); }
    .lib-btn.primary { background: var(--gradient-primary); border: none; color: #fff; }
    .search-row { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
    .lib-search {
      flex: 1; padding: 0.75rem 1rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); color: var(--text-primary); font-size: 0.95rem;
    }
    .lib-search:focus { outline: none; border-color: var(--accent-primary); }
    .lib-search::placeholder { color: var(--text-muted); }
    @media (max-width: 1024px) { .lib-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 768px) { .lib-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px) { .lib-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="navbar" id="navbar"></header>
<div class="mobile-menu" id="mobile-menu"></div>

<div class="page-hero">
  <div class="container">
    <h1>Design <span style="background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Library</span></h1>
    <p>Explore 500+ design resources — UI kits, color palettes, typography guides, icon sets & more.</p>
  </div>
</div>

<div class="section">
  <div class="container">
    <div class="search-row">
      <input class="lib-search" type="text" placeholder="🔍  Search resources..." oninput="filterLib(this.value)" />
      <select style="padding:0.75rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.875rem">
        <option>All Types</option><option>UI Kits</option><option>Icons</option><option>Palettes</option><option>Templates</option>
      </select>
    </div>
    <div class="lib-tabs">
      <button class="lib-tab active" onclick="setLibCat('all',this)">All Resources</button>
      <button class="lib-tab" onclick="setLibCat('uikit',this)">UI Kits</button>
      <button class="lib-tab" onclick="setLibCat('icons',this)">Icon Sets</button>
      <button class="lib-tab" onclick="setLibCat('palette',this)">Color Palettes</button>
      <button class="lib-tab" onclick="setLibCat('typography',this)">Typography</button>
      <button class="lib-tab" onclick="setLibCat('template',this)">Templates</button>
      <button class="lib-tab" onclick="setLibCat('inspiration',this)">Inspiration</button>
    </div>
    <div class="lib-grid" id="lib-grid"></div>
  </div>
</div>

<footer class="footer" id="footer"></footer>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
  const LIBRARY = [
    { emoji:'🎨', title:'Material Design 3 UI Kit', cat:'uikit', type:'UI Kit', items:'240 components', free:false, bg:'rgba(124,58,237,0.15)' },
    { emoji:'🌈', title:'Pastel Color Palette Pack', cat:'palette', type:'Color Palette', items:'50 palettes', free:true, bg:'rgba(236,72,153,0.15)' },
    { emoji:'⚡', title:'Phosphor Icon Set', cat:'icons', type:'Icon Set', items:'6,000+ icons', free:true, bg:'rgba(245,158,11,0.15)' },
    { emoji:'📱', title:'iOS 17 UI Components', cat:'uikit', type:'UI Kit', items:'180 components', free:false, bg:'rgba(6,182,212,0.15)' },
    { emoji:'🔤', title:'Typography Scale Guide', cat:'typography', type:'Typography', items:'20 type scales', free:true, bg:'rgba(16,185,129,0.15)' },
    { emoji:'🖼️', title:'Landing Page Templates', cat:'template', type:'Template', items:'30 templates', free:false, bg:'rgba(124,58,237,0.15)' },
    { emoji:'🎭', title:'Brutalism Design Pack', cat:'inspiration', type:'Inspiration', items:'100 references', free:false, bg:'rgba(236,72,153,0.15)' },
    { emoji:'🔷', title:'Design System Starter', cat:'uikit', type:'UI Kit', items:'320 tokens', free:false, bg:'rgba(6,182,212,0.15)' },
    { emoji:'🌙', title:'Dark Mode Color System', cat:'palette', type:'Color Palette', items:'30 palettes', free:true, bg:'rgba(124,58,237,0.15)' },
    { emoji:'✏️', title:'Figma Wireframe Kit', cat:'uikit', type:'UI Kit', items:'150 frames', free:true, bg:'rgba(245,158,11,0.15)' },
    { emoji:'🎯', title:'Dashboard UI Templates', cat:'template', type:'Template', items:'15 dashboards', free:false, bg:'rgba(16,185,129,0.15)' },
    { emoji:'🔠', title:'Font Pairing Guide', cat:'typography', type:'Typography', items:'40 pairings', free:true, bg:'rgba(236,72,153,0.15)' },
    { emoji:'💎', title:'Glassmorphism UI Kit', cat:'uikit', type:'UI Kit', items:'90 components', free:false, bg:'rgba(6,182,212,0.15)' },
    { emoji:'🌿', title:'Nature Color Palettes', cat:'palette', type:'Color Palette', items:'25 palettes', free:true, bg:'rgba(16,185,129,0.15)' },
    { emoji:'🏠', title:'Real Estate App Template', cat:'template', type:'Template', items:'12 screens', free:false, bg:'rgba(245,158,11,0.15)' },
    { emoji:'🎪', title:'Bauhaus Inspiration Board', cat:'inspiration', type:'Inspiration', items:'80 references', free:true, bg:'rgba(124,58,237,0.15)' },
  ];

  let activeCat = 'all';
  let searchQ = '';

  function setLibCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderLib();
  }

  function filterLib(q) { searchQ = q.toLowerCase(); renderLib(); }

  function renderLib() {
    const filtered = LIBRARY.filter(l => {
      const matchCat = activeCat === 'all' || l.cat === activeCat;
      const matchQ = !searchQ || l.title.toLowerCase().includes(searchQ);
      return matchCat && matchQ;
    });
    document.getElementById('lib-grid').innerHTML = filtered.map(l => `
      <div class="lib-card">
        <div class="lib-thumb" style="background:${l.bg}">
          ${l.emoji}
          <span class="lib-badge ${l.free ? 'lib-badge-free' : 'lib-badge-pro'}">${l.free ? 'FREE' : 'PRO'}</span>
        </div>
        <div class="lib-body">
          <div class="lib-title">${l.title}</div>
          <div class="lib-meta">${l.type} · ${l.items}</div>
        </div>
        <div class="lib-actions">
          <button class="lib-btn" onclick="showToast('Added to collection!','success')">🔖 Save</button>
          <button class="lib-btn primary" onclick="${l.free ? `showToast('Downloading...','success')` : `showToast('Upgrade to Pro to access this resource','info')`}">
            ${l.free ? '⬇ Download' : '🔒 Pro'}
          </button>
        </div>
      </div>`).join('');
  }

  renderLib();
</script>
</body>
</html>
